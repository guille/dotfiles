[settings]
experimental        = true
minimum_release_age = "7d"

[settings.status]
show_deps_stale = false

[settings.python]
uv_venv_auto = true

[settings.pipx]
uvx = true

[settings.npm]
package_manager = "npm"

[tools]
eza                                                          = "latest"
"forgejo:mergiraf/mergiraf"                                  = "latest"
"gem:rubocop"                                                = "latest"
"gem:ruby-lsp"                                               = "latest"
"github:atanunq/viu"                                         = "latest"
"github:fullstorydev/grpcurl"                                = "latest"
"github:guille/orbit"                                        = { version = "latest", minimum_release_age = "0d" }
"github:guille/revisa"                                       = { version = "latest", minimum_release_age = "0d" }
go                                                           = "latest"
"go:github.com/go-delve/delve/cmd/dlv"                       = "latest"
"go:github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc" = "latest"
"go:golang.org/x/tools/gopls"                                = "latest"
"go:golang.org/x/vuln/cmd/govulncheck"                       = "latest"
"go:google.golang.org/grpc/cmd/protoc-gen-go-grpc"           = "latest"
"go:google.golang.org/protobuf/cmd/protoc-gen-go"            = "latest"
"go:honnef.co/go/tools/cmd/staticcheck"                      = "latest"
